name: Deploy to sota.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sota-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify build
        run: |
          npm ci
          npm run build

      - name: Deploy to sota.io
        env:
          SOTA_API_KEY: ${{ secrets.SOTA_API_KEY }}
          SOTA_PROJECT_NAME: ZoteroAddon
          SOTA_PROJECT_ID: 645ec5bb-ad13-4115-9012-99718c01e1c9
        run: |
          npm install --no-save @sota-io/sdk
          node scripts/sota-deploy.mjs
